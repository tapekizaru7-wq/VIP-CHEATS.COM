<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP CHEATS — Скачать читы и софт 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff00aa;
      --accent: #00ffff;
      --dark: #0a001f;
      --glass: rgba(15, 5, 40, 0.75);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, #0a001f 0%, #1a0033 50%, #0f0022 100%);
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Фон с частицами */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255,0,170,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,255,255,0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(255,100,200,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 25s linear infinite;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, 30px); }
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    /* Неоновый заголовок */
    .title {
      font-size: clamp(4.5rem, 10vw, 8rem);
      font-weight: 900;
      text-align: center;
      margin: 40px 0 10px;
      background: linear-gradient(90deg, #ff00aa, #00ffff, #ff00aa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(255,0,170,0.6),
                   0 0 80px rgba(0,255,255,0.4);
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: brightness(1) hue-rotate(0deg); }
      to { filter: brightness(1.2) hue-rotate(15deg); }
    }

    .subtitle {
      text-align: center;
      font-size: 1.6rem;
      color: #a0a0ff;
      margin-bottom: 50px;
      opacity: 0.9;
    }

    /* Переключатель языка */
    .lang-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid rgba(255,0,170,0.4);
      z-index: 1000;
      font-weight: 600;
      box-shadow: 0 0 20px rgba(255,0,170,0.3);
    }

    .lang-btn span {
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn .active {
      background: linear-gradient(135deg, #ff00aa, #00ffff);
      color: #000;
      font-weight: bold;
    }

    /* Карточки игр */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin: 40px 0;
    }

    .game-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,0,170,0.3);
      border-radius: 24px;
      padding: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,0,170,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: 0.5s;
    }

    .game-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: var(--primary);
      box-shadow: 0 0 40px rgba(255,0,170,0.5);
    }

    .game-card:hover::before { opacity: 1; }

    .game-card h3 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #fff;
    }

    /* Панель читов */
    .cheats-panel {
      position: fixed;
      right: -450px;
      top: 0;
      width: 450px;
      height: 100vh;
      background: linear-gradient(180deg, #140022, #0a001f);
      backdrop-filter: blur(20px);
      border-left: 3px solid #ff00aa;
      box-shadow: -10px 0 40px rgba(255,0,170,0.4);
      z-index: 2000;
      transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      padding: 90px 25px 30px;
      overflow-y: auto;
    }

    .cheats-panel.active { right: 0; }

    .cheat-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,0,170,0.2);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      transition: 0.3s;
    }

    .cheat-item:hover {
      border-color: #ff00aa;
      transform: translateX(6px);
    }

    .download-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ff00aa, #00ffff);
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
      font-size: 1.05rem;
      transition: 0.3s;
    }

    .download-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px #ff00aa;
    }
  </style>
</head>
<body>

  <!-- Переключатель языка -->
  <div class="lang-btn" id="langToggle">
    <span id="ruBtn" class="active">RU</span> | <span id="enBtn">EN</span>
  </div>

  <div class="container">
    <h1 class="title">VIP CHEATS</h1>
    <h2 id="subtitle" class="subtitle">Скачать читы и софт 2026</h2>

    <div class="games-grid" id="gamesGrid"></div>
  </div>

  <!-- Панель с читами -->
  <div class="cheats-panel" id="cheatsPanel">
    <div id="panelClose" style="position:absolute; top:25px; right:25px; font-size:2.2rem; cursor:pointer; color:#ff00aa;">✕</div>
    <div id="panelContent"></div>
  </div>

<script>
// ==================== ДАННЫЕ ====================
const gamesData = [ /* (оставил тот же массив из предыдущего ответа) */ 
  // ... вставь сюда gamesData из моего предыдущего ответа ...
];

let currentLang = 'ru';
let userVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');

function downloadLauncher(cheatName) {
  const url = "https://github.com/tapekizaru7-wq/VIP-LAUNCHER/raw/refs/heads/main/VIP%20Launcher.exe";
  const a = document.createElement('a');
  a.href = url;
  a.download = `VIP_Launcher_${cheatName}.exe`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function renderGames() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = gamesData.map(game => `
    <div class="game-card" data-id="${game.id}">
      <h3>${currentLang === 'ru' ? game.name : game.nameEn}</h3>
      <p style="color:#88aaff;">${game.chips.length} вариантов</p>
    </div>
  `).join('');

  document.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => {
      const game = gamesData.find(g => g.id === card.dataset.id);
      if (game) showCheatsPanel(game);
    });
  });
}

function showCheatsPanel(game) {
  const panel = document.getElementById('cheatsPanel');
  const content = document.getElementById('panelContent');

  let html = `<h2 style="color:#ff00aa; text-align:center; margin-bottom:25px;">${currentLang === 'ru' ? game.name : game.nameEn}</h2>`;

  game.chips.forEach(cheat => {
    const voted = userVotes[cheat.name];
    html += `
      <div class="cheat-item">
        <div style="font-size:1.25rem; font-weight:600; margin-bottom:10px;">${cheat.name}</div>
        <button class="download-btn" data-cheat="${cheat.name}">
          <i class="fas fa-download"></i> Скачать ${cheat.name}
        </button>
      </div>
    `;
  });

  content.innerHTML = html;
  panel.classList.add('active');

  document.querySelectorAll('.download-btn').forEach(btn => {
    btn.addEventListener('click', () => downloadLauncher(btn.dataset.cheat));
  });
}

document.getElementById('panelClose').addEventListener('click', () => {
  document.getElementById('cheatsPanel').classList.remove('active');
});

// Переключение языка
function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('ruBtn').classList.toggle('active', lang === 'ru');
  document.getElementById('enBtn').classList.toggle('active', lang === 'en');
  document.getElementById('subtitle').textContent = lang === 'ru' ? 
    "Скачать читы и софт 2026" : "Download Cheats & Software 2026";
  renderGames();
}

document.getElementById('ruBtn').onclick = () => setLanguage('ru');
document.getElementById('enBtn').onclick = () => setLanguage('en');

// Запуск
renderGames();
setLanguage('ru');
</script>
</body>
</html>
